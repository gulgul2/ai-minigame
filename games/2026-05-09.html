<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우주 리듬</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Arial',sans-serif;}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%;}
#nickScreen,#overScreen{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,20,0.92);}
.title{color:#a0f0ff;font-size:2em;font-weight:bold;margin-bottom:10px;text-shadow:0 0 20px #0ff;}
.sub{color:#7090c0;font-size:0.95em;margin-bottom:30px;}
.nick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.nick-btn{padding:14px 28px;border:2px solid #4080ff;background:transparent;color:#a0cfff;font-size:1.1em;border-radius:10px;cursor:pointer;transition:all .2s;}
.nick-btn.selected{background:#4080ff;color:#fff;box-shadow:0 0 15px #4080ff;}
.start-btn,.retry-btn{padding:14px 40px;background:linear-gradient(135deg,#0050ff,#00c8ff);border:none;color:#fff;font-size:1.2em;border-radius:12px;cursor:pointer;box-shadow:0 0 20px #0080ff;margin-top:8px;}
#overScreen .score-big{color:#fff;font-size:2.5em;margin:12px 0;}
#overScreen .lb-title{color:#a0f0ff;font-size:1em;margin:14px 0 6px;}
#overScreen .lb-list{list-style:none;color:#c0e0ff;font-size:0.95em;width:220px;text-align:left;}
#overScreen .lb-list li{padding:4px 0;border-bottom:1px solid #223;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nickScreen">
  <div class="title">🚀 우주 리듬</div>
  <div class="sub">닉네임을 선택하세요</div>
  <div class="nick-grid">
    <button class="nick-btn" onclick="selectNick(this,'태형')">태형</button>
    <button class="nick-btn" onclick="selectNick(this,'상이')">상이</button>
    <button class="nick-btn" onclick="selectNick(this,'세준')">세준</button>
    <button class="nick-btn" onclick="selectNick(this,'영근')">영근</button>
  </div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>
<div id="overScreen" style="display:none;">
  <div class="title">게임 오버</div>
  <div class="score-big" id="finalScore">0</div>
  <div class="lb-title">🏆 오늘의 리더보드</div>
  <ul class="lb-list" id="lbList"></ul>
  <button class="retry-btn" onclick="retry()" style="margin-top:18px;">다시하기</button>
</div>
<script>
const SB=window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,nickname='',score=0,combo=0,lives=3,running=false,raf;
let notes=[],stars=[],particles=[];
let beatInterval=600,lastBeat=0,spawnCol=0,gameTime=0;
const COLS=4,NOTE_SPEED=5;
const COLORS=['#ff4488','#44aaff','#ffcc00','#88ff44'];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function selectNick(el,n){document.querySelectorAll('.nick-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');nickname=n;}
function startGame(){
  if(!nickname)return alert('닉네임을 선택해주세요!');
  document.getElementById('nickScreen').style.display='none';
  score=0;combo=0;lives=3;notes=[];particles=[];gameTime=0;lastBeat=0;running=true;
  initStars();loop();
}
function initStars(){stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.5+0.3,s:Math.random()*0.5+0.2});}
function colX(col){let cw=W/COLS;return cw*col+cw/2;}
function spawnNote(){
  let col=Math.floor(Math.random()*COLS);
  notes.push({x:colX(col),y:-30,col,r:28,alive:true,hit:false,flash:0});
}
function hitZoneY(){return H-100;}
function drawBg(){
  ctx.fillStyle='#00001a';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    s.y+=s.s;if(s.y>H)s.y=0;
    ctx.beginPath();ctx.arc(s.x%W,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.fill();
  });
  let cw=W/COLS;
  for(let i=0;i<COLS;i++){
    ctx.strokeStyle='rgba(80,120,200,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cw*i,0);ctx.lineTo(cw*i,H);ctx.stroke();
    ctx.beginPath();ctx.arc(colX(i),hitZoneY(),32,0,Math.PI*2);
    ctx.strokeStyle=COLORS[i]+'88';ctx.lineWidth=3;ctx.stroke();
  }
}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,40,0.7)';ctx.fillRect(0,0,W,44);
  ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.textAlign='left';
  ctx.fillText('♪ '+nickname,10,30);
  ctx.textAlign='center';ctx.fillStyle='#ffcc44';
  ctx.fillText('SCORE: '+score,W/2,30);
  ctx.textAlign='right';
  let h='';for(let i=0;i<lives;i++)h+='💙';
  ctx.fillText(h,W-10,30);
  if(combo>1){ctx.fillStyle='#ff88ff';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText('COMBO x'+combo,W/2,58);}
}
function drawNotes(){
  notes.forEach(n=>{
    if(!n.alive)return;
    let g=ctx.createRadialGradient(n.x,n.y,2,n.x,n.y,n.r);
    g.addColorStop(0,'#fff');g.addColorStop(0.4,COLORS[n.col]);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    if(n.flash>0){ctx.beginPath();ctx.arc(n.x,n.y,n.r+n.flash*20,0,Math.PI*2);ctx.strokeStyle=COLORS[n.col]+(Math.floor(n.flash*255)).toString(16).padStart(2,'0');ctx.lineWidth=2;ctx.stroke();n.flash-=0.05;}
  });
}
function spawnParticles(x,y,col){for(let i=0;i<10;i++)particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,r:Math.random()*5+2,life:1,col});}
function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.04;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();});
}
function tryHit(tx,ty){
  let hy=hitZoneY(),best=null,bd=999;
  notes.forEach(n=>{if(!n.alive||n.hit)return;let dx=tx-n.x,dy=ty-hy,d=Math.sqrt(dx*dx+dy*dy);if(d<60&&Math.abs(n.y-hy)<80&&d<bd){bd=d;best=n;}});
  if(best){best.alive=false;best.hit=true;score+=10*(1+Math.floor(combo/5));combo++;spawnParticles(best.x,hitZoneY(),COLORS[best.col]);best.flash=1;}
}
function loop(ts=0){
  if(!running)return;
  resize();gameTime+=16;
  let speed=Math.min(NOTE_SPEED+gameTime/20000,12);
  beatInterval=Math.max(350,600-gameTime/200);
  if(ts-lastBeat>beatInterval){spawnNote();lastBeat=ts;}
  notes.forEach(n=>{if(n.alive)n.y+=speed;});
  notes.forEach(n=>{if(n.alive&&n.y>H+40){n.alive=false;lives--;combo=0;}});
  notes=notes.filter(n=>n.alive||n.hit);
  drawBg();drawNotes();drawParticles();drawHUD();
  if(lives<=0){endGame();return;}
  raf=requestAnimationFrame(loop);
}
function endGame(){
  running=false;cancelAnimationFrame(raf);
  document.getElementById('finalScore').textContent='점수: '+score;
  document.getElementById('overScreen').style.display='flex';
  SB.from('scores').insert({game_date:'2026-05-09',nickname,score}).then(()=>loadLB());
}
async function loadLB(){
  const{data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-05-09').order('score',{ascending:false}).limit(5);
  const ul=document.getElementById('lbList');ul.innerHTML='';
  if(data)data.forEach((r,i)=>{let li=document.createElement('li');li.textContent=(i+1)+'. '+r.nickname+' — '+r.score;ul.appendChild(li);});
}
function retry(){document.getElementById('overScreen').style.display='none';document.getElementById('nickScreen').style.display='flex';}
function getPos(e){
  if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();let p=getPos(e);tryHit(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('mousedown',e=>{let p=getPos(e);tryHit(p.x,p.y);});
canvas.addEventListener('mousemove',e=>{});
canvas.addEventListener('mouseup',e=>{});
</script>
</body>
</html>
