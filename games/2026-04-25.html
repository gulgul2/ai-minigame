<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동물 슈팅</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;font-family:'Arial',sans-serif;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%;}
#nickname-screen,#gameover-screen{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,40,0.95);}
h1{color:#ffd700;font-size:2em;margin-bottom:20px;text-shadow:0 0 10px #ffd700;}
.nick-btn{margin:8px;padding:14px 32px;font-size:1.1em;border:2px solid #ffd700;background:transparent;color:#ffd700;border-radius:25px;cursor:pointer;transition:all 0.2s;}
.nick-btn.selected,.nick-btn:hover{background:#ffd700;color:#1a1a2e;}
#start-btn{margin-top:20px;padding:16px 48px;font-size:1.3em;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a2e;border:none;border-radius:30px;cursor:pointer;font-weight:bold;display:none;}
#hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:5;color:#fff;font-size:1.2em;text-shadow:0 0 6px #000;pointer-events:none;}
#gameover-screen h2{color:#ff4444;font-size:2em;margin-bottom:10px;}
#final-score{color:#ffd700;font-size:1.5em;margin-bottom:20px;}
#leaderboard{color:#fff;margin-bottom:20px;text-align:center;min-width:220px;}
#leaderboard h3{color:#ffd700;margin-bottom:8px;}
.lb-row{padding:4px 0;border-bottom:1px solid #333;font-size:0.95em;}
#restart-btn{padding:14px 44px;font-size:1.2em;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a2e;border:none;border-radius:30px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<div id="nickname-screen">
  <h1>🐾 동물 슈팅 🐾</h1>
  <div>
    <button class="nick-btn" onclick="selectNick(this,'태형')">태형</button>
    <button class="nick-btn" onclick="selectNick(this,'상이')">상이</button>
    <button class="nick-btn" onclick="selectNick(this,'세준')">세준</button>
    <button class="nick-btn" onclick="selectNick(this,'영근')">영근</button>
  </div>
  <button id="start-btn" onclick="startGame()">START 🚀</button>
</div>
<div id="hud">점수: <span id="score-display">0</span></div>
<canvas id="c"></canvas>
<div id="gameover-screen" style="display:none;">
  <h2>GAME OVER</h2>
  <div id="final-score"></div>
  <div id="leaderboard"><h3>🏆 리더보드</h3><div id="lb-rows">로딩중...</div></div>
  <button id="restart-btn" onclick="location.reload()">다시하기 🔄</button>
</div>
<script>
const SB = window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,nickname='',score=0,lives=3,running=false,animId;
let player,bullets=[],enemies=[],particles=[],stars=[];
let shootCooldown=0,spawnTimer=0,level=1;
const EMOJIS=['🐰','🐸','🦊','🐧','🦁','🐼','🐨','🦄'];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function selectNick(btn,name){document.querySelectorAll('.nick-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');nickname=name;document.getElementById('start-btn').style.display='block';}
function initGame(){
  player={x:W/2,y:H-80,w:40,h:40,emoji:'🚀',speed:6,moving:false,tx:W/2};
  bullets=[];enemies=[];particles=[];
  stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,v:Math.random()*1.5+0.5}));
  score=0;lives=3;running=true;shootCooldown=0;spawnTimer=0;level=1;
  document.getElementById('score-display').textContent=0;
}
function startGame(){if(!nickname)return;document.getElementById('nickname-screen').style.display='none';initGame();loop();}
function spawnEnemy(){
  const emoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  const x=40+Math.random()*(W-80);
  const speed=1+level*0.3+Math.random()*1.5;
  enemies.push({x,y:-30,w:36,h:36,emoji,speed,hp:1+(level>3?1:0)});
}
function addParticles(x,y,color){for(let i=0;i<8;i++)particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:1,color});}
let touchX=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{ passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{ passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();touchX=null;},{passive:false});
canvas.addEventListener('mousedown',e=>{touchX=e.clientX;});
canvas.addEventListener('mousemove',e=>{if(touchX!==null)touchX=e.clientX;});
canvas.addEventListener('mouseup',()=>{touchX=null;});
function update(){
  if(!running)return;
  stars.forEach(s=>{s.y+=s.v;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  if(touchX!==null){
    const dx=touchX-player.x;
    if(Math.abs(dx)>4)player.x+=Math.sign(dx)*Math.min(player.speed,Math.abs(dx));
  }
  player.x=Math.max(20,Math.min(W-20,player.x));
  shootCooldown--;
  if(shootCooldown<=0){bullets.push({x:player.x,y:player.y-20,w:6,h:18,speed:12});shootCooldown=18;}
  bullets.forEach(b=>b.y-=b.speed);
  bullets=bullets.filter(b=>b.y>-20);
  spawnTimer--;
  if(spawnTimer<=0){spawnEnemy();spawnTimer=Math.max(30,70-level*5);}
  level=1+Math.floor(score/200);
  enemies.forEach(e=>{e.y+=e.speed;});
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.y>H+40){enemies.splice(i,1);lives--;if(lives<=0)gameOver();continue;}
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(Math.abs(b.x-e.x)<28&&Math.abs(b.y-e.y)<28){
        e.hp--;bullets.splice(j,1);
        if(e.hp<=0){addParticles(e.x,e.y,'#ffd700');enemies.splice(i,1);score+=10*(level);document.getElementById('score-display').textContent=score;}
        break;
      }
    }
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(Math.abs(e.x-player.x)<32&&Math.abs(e.y-player.y)<32){
      addParticles(player.x,player.y,'#ff4444');enemies.splice(i,1);lives--;if(lives<=0)gameOver();
    }
  }
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.05;p.vy+=0.1;});
  particles=particles.filter(p=>p.life>0);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a28';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${0.4+s.s*0.2})`;ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();});
  bullets.forEach(b=>{ctx.fillStyle='#00eaff';ctx.shadowBlur=8;ctx.shadowColor='#00eaff';ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);ctx.shadowBlur=0;});
  enemies.forEach(e=>{ctx.font=`${e.w}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.emoji,e.x,e.y);});
  ctx.font='40px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(player.emoji,player.x,player.y);
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,5*p.life,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
  ctx.font='18px Arial';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='top';
  let hstr='';for(let i=0;i<lives;i++)hstr+='❤️';
  ctx.fillText(hstr,10,14);
  ctx.textAlign='right';ctx.fillText(`Lv.${level}`,W-10,14);
}
function loop(){if(!running)return;update();draw();animId=requestAnimationFrame(loop);}
async function gameOver(){
  running=false;cancelAnimationFrame(animId);
  await SB.from('scores').insert({game_date:'2026-04-25',nickname,score});
  document.getElementById('final-score').textContent=`${nickname}의 점수: ${score}점`;
  const {data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-04-25').order('score',{ascending:false}).limit(5);
  const lb=document.getElementById('lb-rows');
  lb.innerHTML='';
  if(data)data.forEach((r,i)=>{const d=document.createElement('div');d.className='lb-row';d.textContent=`${i+1}. ${r.nickname} - ${r.score}점`;lb.appendChild(d);});
  document.getElementById('gameover-screen').style.display='flex';
}
</script>
</body>
</html>
