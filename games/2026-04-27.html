<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>레트로 슈팅</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Courier New',monospace;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%;}
#nickScreen,#overScreen{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);}
h1{color:#0f0;font-size:2em;text-shadow:0 0 10px #0f0;margin-bottom:20px;letter-spacing:4px;}
.sub{color:#ff0;font-size:1em;margin-bottom:30px;letter-spacing:2px;}
.nick-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:24px;}
.nbtn{background:#000;color:#0ff;border:2px solid #0ff;padding:12px 22px;font-size:1.1em;font-family:'Courier New',monospace;cursor:pointer;border-radius:4px;transition:all .2s;}
.nbtn.sel{background:#0ff;color:#000;}
#startBtn,#retryBtn{background:#000;color:#0f0;border:2px solid #0f0;padding:14px 40px;font-size:1.2em;font-family:'Courier New',monospace;cursor:pointer;border-radius:4px;margin-top:8px;}
#startBtn:hover,#retryBtn:hover{background:#0f0;color:#000;}
#overScreen h2{color:#f00;font-size:1.8em;text-shadow:0 0 10px #f00;margin-bottom:10px;}
#finalScore{color:#ff0;font-size:1.3em;margin-bottom:18px;}
#board{color:#0ff;font-size:.95em;line-height:1.8em;margin-bottom:18px;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nickScreen">
  <h1>RETRO SHOOTER</h1>
  <div class="sub">2026-04-27</div>
  <div class="nick-btns">
    <button class="nbtn" onclick="selNick(this,'태형')">태형</button>
    <button class="nbtn" onclick="selNick(this,'상이')">상이</button>
    <button class="nbtn" onclick="selNick(this,'세준')">세준</button>
    <button class="nbtn" onclick="selNick(this,'영근')">영근</button>
  </div>
  <button id="startBtn" onclick="startGame()">▶ START</button>
</div>
<div id="overScreen" style="display:none;">
  <h2>GAME OVER</h2>
  <div id="finalScore"></div>
  <div id="board"></div>
  <button id="retryBtn" onclick="retry()">↺ 다시하기</button>
</div>
<script>
const SB=window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,nick='',score=0,lives=3,running=false,raf,stars=[];
let ship,bullets=[],enemies=[],ebullets=[],particles=[],shotTimer=0,eSpawnT=0,lvl=1,frame=0;
function resize(){cv.width=W=window.innerWidth;cv.height=H=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function selNick(el,n){document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');nick=n;}
function mkStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+.5,sp:Math.random()*1.5+.5});}
function startGame(){if(!nick){alert('닉네임을 선택해주세요!');return;}document.getElementById('nickScreen').style.display='none';initGame();}
function initGame(){score=0;lives=3;bullets=[];enemies=[];ebullets=[];particles=[];lvl=1;frame=0;eSpawnT=0;shotTimer=0;mkStars();
ship={x:W/2,y:H-100,w:28,h:32,vx:0,tx:W/2};running=true;loop();}
function retry(){document.getElementById('overScreen').style.display='none';initGame();}
let touchX=null,mouseX=null;
cv.addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();touchX=null;},{passive:false});
cv.addEventListener('mousedown',e=>{mouseX=e.clientX;});
cv.addEventListener('mousemove',e=>{if(mouseX!==null)mouseX=e.clientX;});
cv.addEventListener('mouseup',()=>{mouseX=null;});
function spawnEnemy(){const cols=4+Math.floor(lvl/2),gap=W/(cols+1);
for(let i=0;i<cols;i++){enemies.push({x:gap*(i+1),y:-30+Math.random()*-20,w:24,h:20,hp:1+Math.floor(lvl/3),sp:(.6+Math.random()*.4)*(1+lvl*.05),dir:1,shot:Math.random()*120});}}
function shoot(){bullets.push({x:ship.x,y:ship.y-16,w:4,h:12});}
function pExplode(x,y,col){for(let i=0;i<8;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-2)*3,life:30,col:col||'#ff0'});}
function update(){frame++;
const tx=touchX||mouseX||ship.tx;ship.tx=tx;ship.x+=(ship.tx-ship.x)*.15;
ship.x=Math.max(ship.w,Math.min(W-ship.w,ship.x));
shotTimer--;if(shotTimer<=0){shoot();shotTimer=Math.max(8,20-lvl*2);}
bullets=bullets.filter(b=>{b.y-=12;return b.y>-20;});
eSpawnT--;if(eSpawnT<=0&&enemies.length<(4+lvl)*2){spawnEnemy();eSpawnT=Math.max(30,120-lvl*10);}
enemies.forEach(e=>{e.x+=e.sp*e.dir;if(e.x>W-20||e.x<20)e.dir*=-1;e.y+=.3+lvl*.05;
e.shot--;if(e.shot<=0){ebullets.push({x:e.x,y:e.y+10,vx:(ship.x-e.x)/80,vy:2+Math.random()*lvl*.3});e.shot=80+Math.random()*60;}});
ebullets=ebullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;if(b.y>H+20)return false;
const dx=b.x-ship.x,dy=b.y-ship.y;if(Math.abs(dx)<18&&Math.abs(dy)<18){lives--;pExplode(ship.x,ship.y,'#f00');if(lives<=0){gameOver();return false;}return false;}return true;});
bullets.forEach(b=>{enemies=enemies.filter(e=>{const hit=Math.abs(b.x-e.x)<20&&Math.abs(b.y-e.y)<16;if(hit){e.hp--;if(e.hp<=0){score+=10*(1+Math.floor(lvl/2));pExplode(e.x,e.y);}return e.hp>0;}return true;});});
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;return p.life>0;});
stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
if(enemies.length===0&&frame%200===0)lvl++;
if(frame%600===0)lvl++;}
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s/3})`;ctx.beginPath();ctx.arc(s.x,s.y,s.s*.5,0,Math.PI*2);ctx.fill();});
ctx.save();ctx.translate(ship.x,ship.y);ctx.fillStyle='#0ff';ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(-14,16);ctx.lineTo(0,8);ctx.lineTo(14,16);ctx.closePath();ctx.fill();
ctx.fillStyle='#ff0';ctx.fillRect(-4,8,8,6);ctx.restore();
bullets.forEach(b=>{ctx.fillStyle='#0ff';ctx.shadowBlur=6;ctx.shadowColor='#0ff';ctx.fillRect(b.x-2,b.y,4,b.h);ctx.shadowBlur=0;});
enemies.forEach(e=>{ctx.fillStyle=lvl>5?'#f0f':'#f80';ctx.beginPath();ctx.moveTo(e.x,e.y-10);ctx.lineTo(e.x-12,e.y+10);ctx.lineTo(e.x+12,e.y+10);ctx.closePath();ctx.fill();ctx.fillStyle='#ff0';ctx.fillRect(e.x-4,e.y-4,8,8);});
ebullets.forEach(b=>{ctx.fillStyle='#f00';ctx.shadowBlur=4;ctx.shadowColor='#f00';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
particles.forEach(p=>{ctx.globalAlpha=p.life/30;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
ctx.fillStyle='#0f0';ctx.font='bold 16px Courier New';ctx.fillText('SCORE: '+score,10,24);
ctx.fillStyle='#ff0';ctx.fillText('LV: '+lvl,W/2-20,24);
ctx.fillStyle='#f44';ctx.fillText('♥'.repeat(lives),W-80,24);}
function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}
async function gameOver(){running=false;cancelAnimationFrame(raf);
await SB.from('scores').insert({game_date:'2026-04-27',nickname:nick,score});
const {data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-04-27').order('score',{ascending:false}).limit(5);
document.getElementById('finalScore').textContent=nick+' - '+score+' pts';
let bd='🏆 LEADERBOARD\n';if(data)data.forEach((r,i)=>bd+=`${i+1}. ${r.nickname}  ${r.score}\n`);
document.getElementById('board').textContent=bd;
document.getElementById('overScreen').style.display='flex';}
</script>
</body>
</html>
