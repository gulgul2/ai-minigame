<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우주 레이싱</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Arial',sans-serif;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%;}
.screen{position:fixed;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.92);}
h1{color:#7af;font-size:2em;margin-bottom:10px;text-shadow:0 0 20px #4af;}
.sub{color:#adf;font-size:0.9em;margin-bottom:30px;letter-spacing:2px;}
.nick-btn{background:rgba(30,60,120,0.7);color:#aef;border:2px solid #4af;border-radius:12px;padding:14px 32px;font-size:1.1em;margin:8px;cursor:pointer;min-width:140px;transition:all 0.2s;}
.nick-btn.sel{background:#1a6fff;color:#fff;border-color:#fff;box-shadow:0 0 16px #4af;}
.start-btn{background:linear-gradient(135deg,#1a6fff,#0af);color:#fff;border:none;border-radius:16px;padding:16px 50px;font-size:1.2em;margin-top:20px;cursor:pointer;box-shadow:0 0 24px #0af8;}
.hud{position:fixed;top:12px;left:0;width:100%;z-index:5;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none;}
.hud span{color:#aef;font-size:1em;background:rgba(0,0,40,0.6);padding:6px 14px;border-radius:8px;border:1px solid #4af4;}
.over-box{background:rgba(0,5,30,0.97);border:2px solid #4af;border-radius:20px;padding:30px 36px;text-align:center;width:90%;max-width:360px;}
.over-box h2{color:#7af;font-size:1.6em;margin-bottom:6px;}
.score-disp{color:#0ff;font-size:2.2em;font-weight:bold;margin:10px 0;}
.lb{width:100%;margin:14px 0;}
.lb-row{display:flex;justify-content:space-between;color:#adf;font-size:0.95em;padding:4px 8px;border-bottom:1px solid #2af2;}
.lb-row.me{color:#ff0;font-weight:bold;}
.retry-btn{background:linear-gradient(135deg,#1a6fff,#0af);color:#fff;border:none;border-radius:14px;padding:13px 40px;font-size:1.1em;margin-top:16px;cursor:pointer;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" class="hud" style="display:none"><span id="hScore">점수: 0</span><span id="hLife">❤️❤️❤️</span></div>
<div id="nickScreen" class="screen">
<h1>🚀 우주 레이싱</h1>
<div class="sub">2026-05-28</div>
<div id="nickBtns"><button class="nick-btn" onclick="selNick(this,'태형')">태형</button><button class="nick-btn" onclick="selNick(this,'상이')">상이</button><button class="nick-btn" onclick="selNick(this,'세준')">세준</button><button class="nick-btn" onclick="selNick(this,'영근')">영근</button></div>
<button class="start-btn" onclick="startGame()">START</button>
</div>
<div id="overScreen" class="screen" style="display:none">
<div class="over-box">
<h2>🛸 게임 오버</h2>
<div class="score-disp" id="finalScore">0</div>
<div id="lb" class="lb"></div>
<button class="retry-btn" onclick="retry()">다시하기</button>
</div>
</div>
<script>
const SB=window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,nick='',score=0,life=3,running=false,raf;
let ship,obstacles=[],stars=[],bullets=[],particles=[];
let spd=3,frame=0,lastObs=0,dragX=null,shootCd=0;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

function selNick(el,n){nick=n;document.querySelectorAll('.nick-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function startGame(){if(!nick)return alert('닉네임을 선택하세요!');document.getElementById('nickScreen').style.display='none';document.getElementById('hud').style.display='flex';init();running=true;loop();}
function retry(){document.getElementById('overScreen').style.display='none';document.getElementById('hud').style.display='flex';init();running=true;loop();}

function init(){
score=0;life=3;spd=3;frame=0;lastObs=0;obstacles=[];bullets=[];particles=[];shootCd=0;
stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,s:Math.random()*1.5+0.5}));
ship={x:W/2,y:H*0.75,w:36,h:48,tx:W/2};
updateHUD();
}

function updateHUD(){document.getElementById('hScore').textContent='점수: '+score;document.getElementById('hLife').textContent='❤️'.repeat(Math.max(0,life));}

function spawnObs(){
const types=['rock','enemy'];
const t=types[Math.random()<0.6?0:1];
const x=Math.random()*(W-60)+30;
obstacles.push({x,y:-30,w:34,h:34,t,hp:t==='enemy'?2:1,angle:0});
}

function addParticles(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:30,col});}

function drawShip(x,y){
ctx.save();ctx.translate(x,y);
const g=ctx.createLinearGradient(0,-24,0,24);g.addColorStop(0,'#4af');g.addColorStop(1,'#06f');
ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-24);ctx.lineTo(-18,20);ctx.lineTo(0,12);ctx.lineTo(18,20);ctx.closePath();ctx.fill();
ctx.fillStyle='#0ff8';ctx.beginPath();ctx.ellipse(0,4,8,6,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(0,150,255,0.3)';ctx.beginPath();ctx.ellipse(0,22,10,6,0,0,Math.PI*2);ctx.fill();
ctx.restore();
}

function drawObs(o){
ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.angle);
if(o.t==='rock'){ctx.fillStyle='#888';ctx.beginPath();ctx.arc(0,0,o.w/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(-5,-5,6,0,Math.PI*2);ctx.fill();}
else{ctx.fillStyle='#f44';ctx.beginPath();ctx.moveTo(0,-17);ctx.lineTo(14,14);ctx.lineTo(-14,14);ctx.closePath();ctx.fill();ctx.fillStyle='#ff08';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();}
ctx.restore();
}

function loop(){
if(!running)return;
ctx.clearRect(0,0,W,H);
ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);
stars.forEach(s=>{s.y+=s.s;if(s.y>H)s.y=0;ctx.fillStyle='rgba(200,220,255,0.8)';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
frame++;spd=3+Math.floor(score/200)*0.5;
if(frame-lastObs>Math.max(40,90-Math.floor(score/100)*5)){spawnObs();lastObs=frame;}
ship.x+=(ship.tx-ship.x)*0.12;
if(shootCd>0)shootCd--;
if(shootCd===0){bullets.push({x:ship.x,y:ship.y-24});shootCd=18;}
bullets=bullets.filter(b=>{b.y-=10;ctx.fillStyle='#0ff';ctx.fillRect(b.x-3,b.y,6,14);return b.y>-20;});
obstacles=obstacles.filter(o=>{
o.y+=spd+(o.t==='enemy'?1:0);o.angle+=0.03;
let hit=false;
bullets=bullets.filter(b=>{if(Math.abs(b.x-o.x)<o.w/2+4&&Math.abs(b.y-o.y)<o.h/2+8){o.hp--;addParticles(o.x,o.y,'#f80',6);return false;}return true;});
if(o.hp<=0){score+=o.t==='enemy'?50:20;addParticles(o.x,o.y,'#fa0',12);updateHUD();hit=true;}
if(!hit&&o.y>H+40){if(o.t!=='enemy'){}return false;}
if(!hit&&Math.abs(o.x-ship.x)<(o.w/2+16)&&Math.abs(o.y-ship.y)<(o.h/2+20)){life--;addParticles(ship.x,ship.y,'#f00',16);updateHUD();if(life<=0){gameOver();return false;}return false;}
if(!hit)drawObs(o);
return !hit&&o.y<H+40;
});
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;ctx.globalAlpha=p.life/30;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;return p.life>0;});
drawShip(ship.x,ship.y);
score++;if(frame%30===0)updateHUD();
raf=requestAnimationFrame(loop);
}

async function gameOver(){
running=false;cancelAnimationFrame(raf);
document.getElementById('hud').style.display='none';
document.getElementById('finalScore').textContent='점수: '+score;
document.getElementById('overScreen').style.display='flex';
document.getElementById('lb').innerHTML='<div style="color:#adf">저장 중...</div>';
await SB.from('scores').insert({game_date:'2026-05-28',nickname:nick,score});
const {data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-05-28').order('score',{ascending:false}).limit(5);
let html='<div class="lb-row" style="color:#7af;font-weight:bold"><span>순위</span><span>닉네임</span><span>점수</span></div>';
if(data)data.forEach((r,i)=>{const me=r.nickname===nick&&r.score===score;html+=`<div class="lb-row${me?' me':''}"><span>${i+1}위</span><span>${r.nickname}</span><span>${r.score}</span></div>`;});
document.getElementById('lb').innerHTML=html;
}

function getX(e){return e.touches?e.touches[0].clientX:e.clientX;}
canvas.addEventListener('touchstart',e=>{e.preventDefault();dragX=getX(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();dragX=getX(e);ship.tx=Math.max(20,Math.min(W-20,dragX));},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();dragX=null;},{passive:false});
canvas.addEventListener('mousedown',e=>{dragX=getX(e);});
canvas.addEventListener('mousemove',e=>{if(dragX!==null){dragX=getX(e);ship.tx=Math.max(20,Math.min(W-20,dragX));}});
canvas.addEventListener('mouseup',()=>{dragX=null;});
</script>
</body>
</html>
