<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>바다 디펜스</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#001a33;font-family:'Arial',sans-serif;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%;}
#nickScreen,#overScreen{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,10,30,0.92);}
h1{color:#00e5ff;font-size:2em;margin-bottom:10px;text-shadow:0 0 20px #00e5ff;}
.sub{color:#7ecfff;margin-bottom:30px;font-size:1em;}
.nick-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;}
.nick-btn{padding:12px 22px;border:2px solid #00e5ff;background:transparent;color:#00e5ff;border-radius:30px;font-size:1.1em;cursor:pointer;transition:all .2s;}
.nick-btn.selected,.nick-btn:hover{background:#00e5ff;color:#001a33;font-weight:bold;}
#startBtn,#retryBtn{padding:14px 40px;background:linear-gradient(135deg,#0077b6,#00e5ff);color:#fff;border:none;border-radius:30px;font-size:1.2em;cursor:pointer;box-shadow:0 4px 20px #00e5ff55;margin-top:10px;}
#hud{position:fixed;top:10px;left:0;width:100%;z-index:5;display:flex;justify-content:space-between;padding:0 16px;pointer-events:none;}
#hud span{color:#fff;font-size:1em;background:rgba(0,0,0,0.4);padding:4px 12px;border-radius:20px;}
#overScreen h2{color:#ff6b6b;font-size:1.8em;margin-bottom:10px;}
#overScreen .score{color:#fff;font-size:1.3em;margin-bottom:20px;}
#leaderboard{background:rgba(255,255,255,0.07);border-radius:14px;padding:14px 28px;margin-bottom:20px;min-width:220px;}
#leaderboard h3{color:#00e5ff;text-align:center;margin-bottom:10px;}
#leaderboard ol{color:#fff;padding-left:18px;line-height:2;}
#leaderboard li span{float:right;margin-left:20px;color:#ffd166;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" style="display:none"><span id="scoreLbl">점수: 0</span><span id="livesLbl">❤️❤️❤️</span></div>
<div id="nickScreen">
  <h1>🌊 바다 디펜스</h1>
  <p class="sub">닉네임을 선택하세요</p>
  <div class="nick-btns">
    <button class="nick-btn" onclick="selectNick(this,'태형')">태형</button>
    <button class="nick-btn" onclick="selectNick(this,'상이')">상이</button>
    <button class="nick-btn" onclick="selectNick(this,'세준')">세준</button>
    <button class="nick-btn" onclick="selectNick(this,'영근')">영근</button>
  </div>
  <button id="startBtn" onclick="startGame()">START</button>
</div>
<div id="overScreen" style="display:none">
  <h2>🐙 게임 오버</h2>
  <div class="score" id="finalScore"></div>
  <div id="leaderboard"><h3>🏆 리더보드</h3><ol id="lbList"></ol></div>
  <button id="retryBtn" onclick="location.reload()">다시하기</button>
</div>
<script>
const SB=window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,nickname='',score=0,lives=3,running=false,frame=0,spawnTimer=0,bullets=[],enemies=[],particles=[],waves=[];
let turretAngle=0,shooting=false,touchX=null,touchY=null;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

function selectNick(el,name){document.querySelectorAll('.nick-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');nickname=name;}

function startGame(){
  if(!nickname)return alert('닉네임을 선택하세요!');
  document.getElementById('nickScreen').style.display='none';
  document.getElementById('hud').style.display='flex';
  running=true;loop();
}

const BASE={x:()=>W/2,y:()=>H-80};

canvas.addEventListener('mousedown',e=>{shooting=true;updateAim(e.clientX,e.clientY);});
canvas.addEventListener('mousemove',e=>{if(shooting)updateAim(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',()=>{shooting=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();shooting=true;updateAim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();updateAim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();shooting=false;},{passive:false});

function updateAim(x,y){touchX=x;touchY=y;turretAngle=Math.atan2(y-BASE.y(),x-BASE.x());}

function spawnEnemy(){
  const side=Math.random()<0.5?'L':'R';
  const x=side==='L'?-30:W+30;
  const y=Math.random()*(H*0.55)+40;
  const spd=1.2+score/800;
  const hp=1+Math.floor(score/300);
  enemies.push({x,y,vx:(side==='L'?1:-1)*spd,vy:0.3+Math.random()*0.4,hp,maxHp:hp,r:22,type:Math.floor(Math.random()*3)});
}

function shoot(){
  if(touchX===null)return;
  const bx=BASE.x(),by=BASE.y();
  const ang=turretAngle;
  const spd=10;
  bullets.push({x:bx,y:by,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:6,life:80});
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:30,color});
}

function drawBase(){
  const bx=BASE.x(),by=BASE.y();
  ctx.save();
  ctx.translate(bx,by);
  ctx.fillStyle='#0077b6';
  ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#00e5ff';ctx.lineWidth=3;ctx.stroke();
  ctx.rotate(turretAngle);
  ctx.fillStyle='#90e0ef';
  ctx.fillRect(0,-7,44,14);
  ctx.fillStyle='#00e5ff';
  ctx.fillRect(36,-5,14,10);
  ctx.restore();
}

function drawEnemy(e){
  const colors=[['#ff6b6b','#c1121f'],['#ffd166','#f77f00'],['#a8dadc','#457b9d']];
  const [fill,stroke]=colors[e.type];
  ctx.save();ctx.translate(e.x,e.y);
  ctx.fillStyle=fill;
  ctx.beginPath();
  if(e.type===0){ctx.arc(0,0,e.r,0,Math.PI*2);}
  else if(e.type===1){ctx.moveTo(0,-e.r);ctx.lineTo(e.r,e.r);ctx.lineTo(-e.r,e.r);ctx.closePath();}
  else{ctx.rect(-e.r,-e.r,e.r*2,e.r*2);}
  ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(255,100,100,0.9)';
  ctx.fillRect(-e.r,-e.r-8,e.r*2*(e.hp/e.maxHp),5);
  ctx.restore();
}

function drawWaves(){
  waves.forEach(w=>{
    ctx.strokeStyle=`rgba(0,229,255,${w.alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=0;x<W;x+=8){ctx.lineTo(x,w.y+Math.sin((x+w.offset)*0.03)*10);}
    ctx.stroke();
    w.offset+=1;w.alpha-=0.003;
  });
  waves=waves.filter(w=>w.alpha>0);
  if(frame%60===0)waves.push({y:Math.random()*H*0.7+20,alpha:0.5,offset:0});
}

function drawBg(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#023e8a');grad.addColorStop(1,'#0077b6');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  drawWaves();
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(W*0.1*i+50,H*0.9,60+i*20,Math.PI,Math.PI*2);ctx.fill();}
}

let shootCd=0;
function loop(){
  if(!running)return;
  requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0,0,W,H);
  drawBg();

  if(shooting&&shootCd<=0){shoot();shootCd=12;}
  if(shootCd>0)shootCd--;

  spawnTimer++;
  const interval=Math.max(60,120-score/20);
  if(spawnTimer>interval){spawnEnemy();spawnTimer=0;}

  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    ctx.fillStyle='#ffe066';ctx.shadowBlur=10;ctx.shadowColor='#fff';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    return b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20;
  });

  enemies=enemies.filter(e=>{
    e.x+=e.vx;e.y+=e.vy;
    if(e.y>H*0.85)e.vy*=-1;if(e.y<20)e.vy=Math.abs(e.vy);
    const bx=BASE.x(),by=BASE.y();
    const dist=Math.hypot(e.x-bx,e.y-by);
    if(dist<e.r+36){lives--;spawnParticles(bx,by,'#ff6b6b',12);document.getElementById('livesLbl').textContent='❤️'.repeat(Math.max(0,lives));if(lives<=0)gameOver();return false;}
    bullets.forEach((b,i)=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<b.r+e.r){e.hp--;b.life=0;spawnParticles(e.x,e.y,'#ffd166',6);}
    });
    if(e.hp<=0){score+=10+e.maxHp*5;document.getElementById('scoreLbl').textContent='점수: '+score;spawnParticles(e.x,e.y,'#00e5ff',12);return false;}
    drawEnemy(e);
    return true;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=0.1;
    ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return p.life>0;
  });

  drawBase();
}

async function gameOver(){
  running=false;
  document.getElementById('hud').style.display='none';
  document.getElementById('overScreen').style.display='flex';
  document.getElementById('finalScore').textContent=nickname+'님의 점수: '+score;
  await SB.from('scores').insert({game_date:'2026-05-18',nickname,score});
  const{data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-05-18').order('score',{ascending:false}).limit(5);
  const ol=document.getElementById('lbList');ol.innerHTML='';
  (data||[]).forEach((r,i)=>{const li=document.createElement('li');li.innerHTML=`${r.nickname}<span>${r.score}</span>`;ol.appendChild(li);});
}
</script>
</body>
</html>
