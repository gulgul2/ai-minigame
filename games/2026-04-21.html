<script>
// ========================
// GAME STATE
// ========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
let gameState = 'nickname'; // nickname, playing, gameover
let nickname = '';
let score = 0;
let bestScore = 0;
let lives = 3;
let frameCount = 0;
let animId = null;
let gameRunning = false;

const BEST_KEY = 'best_2026-04-21';

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ========================
// GAME OBJECTS
// ========================
let player = {};
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];
let trees = [];
let powerups = [];
let explosions = [];

// Input state
let inputState = { x: 0, y: 0, shooting: false, active: false };
let autoShootInterval = null;

// Difficulty
let difficultyLevel = 1;
let enemySpawnRate = 120;
let enemySpeed = 1.2;
let bossActive = false;
let bossEnemy = null;
let nextBossScore = 500;

// ========================
// PARTICLE SYSTEM
// ========================
function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function spawnLeafParticles(x, y) {
  const colors = ['#44ff44','#22cc22','#88ff44','#ffff44','#aaff88'];
  spawnParticles(x, y, colors[Math.floor(Math.random()*colors.length)], 8, 3);
}

function spawnExplosion(x, y, big) {
  const colors = ['#ff8800','#ff4400','#ffdd00','#ff2200','#ffffff'];
  const count = big ? 20 : 10;
  const spread = big ? 5 : 3;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1+Math.random()*spread;
    explosions.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      decay: 0.03+Math.random()*0.03,
      size: big ? 4+Math.random()*6 : 2+Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

// ========================
// INIT GAME
// ========================
function initGame() {
  score = 0;
  lives = 3;
  frameCount = 0;
  difficultyLevel = 1;
  enemySpawnRate = 120;
  enemySpeed = 1.2;
  bossActive = false;
  bossEnemy = null;
  nextBossScore = 500;

  bullets = [];
  enemies = [];
  particles = [];
  explosions = [];
  powerups = [];

  // Generate background trees
  trees = [];
  for(let i=0;i<12;i++){
    trees.push({
      x: Math.random()*W,
      y: H*0.3 + Math.random()*H*0.5,
      scale: 0.5+Math.random()*0.8,
      sway: Math.random()*Math.PI*2,
      swaySpeed: 0.01+Math.random()*0.01
    });
  }

  // Generate stars (background)
  stars = [];
  for(let i=0;i<30;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H*0.4,
      r: 0.5+Math.random()*1.5,
      twinkle: Math.random()*Math.PI*2
    });
  }

  // Player
  player = {
    x: W/2,
    y: H - 120,
    w: 36,
    h: 44,
    speed: 5,
    shootCooldown: 0,
    shootRate: 15,
    powerLevel: 1,
    powerTimer: 0,
    invincible: 0,
    trail: []
  };

  inputState = { x: W/2, y: H-120, shooting: false, active: false };

  // Auto shoot
  if(autoShootInterval) clearInterval(autoShootInterval);
}

// ========================
// PLAYER DRAW
// ========================
function drawPlayer() {
  if(player.invincible > 0 && Math.floor(frameCount/4)%2===0) return;

  ctx.save();
  ctx.translate(player.x, player.y);

  // Trail effect
  player.trail.forEach((t, i) => {
    const alpha = (i/player.trail.length)*0.3;
    ctx.beginPath();
    ctx.arc(t.x - player.x, t.y - player.y, 8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,255,100,${alpha})`;
    ctx.fill();
  });

  // Body (leaf-shaped spacecraft)
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 20, 0, 0, Math.PI*2);
  ctx.fillStyle = player.powerLevel >= 2 ? '#22ddff' : '#33ee66';
  ctx.fill();
  ctx.strokeStyle = player.powerLevel >= 2 ? '#ffffff' : '#aaffcc';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Wings
  ctx.beginPath();
  ctx.moveTo(-14, 8);
  ctx.lineTo(-28, 18);
  ctx.lineTo(-10, 12);
  ctx.fillStyle = player.powerLevel >= 2 ? '#11aacc' : '#22cc55';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(14, 8);
  ctx.lineTo(28, 18);
  ctx.lineTo(10, 12);
  ctx.fillStyle = player.powerLevel >= 2 ? '#11aacc' : '#22cc55';
  ctx.fill();

  // Cockpit
  ctx.beginPath();
  ctx.ellipse(0, -6, 7, 9, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(100,255,200,0.6)';
  ctx.fill();

  // Engine glow
  const grd = ctx.createRadialGradient(0, 16, 0, 0, 16, 14);
  grd.addColorStop(0, 'rgba(0,255,100,0.9)');
  grd.addColorStop(1, 'rgba(0,255,100,0)');
  ctx.beginPath();
  ctx.arc(0, 16, 14, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.restore();
}

// ========================
// BULLET
// ========================
function fireBullet() {
  if(player.shootCooldown > 0) return;
  player.shootCooldown = player.shootRate;

  if(player.powerLevel === 1) {
    bullets.push({ x: player.x, y: player.y-22, vx: 0, vy: -12, r: 5, type:'player', color:'#00ff88' });
  } else if(player.powerLevel === 2) {
    bullets.push({ x: player.x-8, y: player.y-16, vx: -1, vy: -11, r: 5, type:'player', color:'#00ffff' });
    bullets.push({ x: player.x+8, y: player.y-16, vx: 1, vy: -11, r: 5, type:'player', color:'#00ffff' });
  } else {
    bullets.push({ x: player.x, y: player.y-22, vx: 0, vy: -13, r: 6, type:'player', color:'#ffff00' });
    bullets.push({ x: player.x-12, y: player.y-14, vx: -1.5, vy: -11, r: 4, type:'player', color:'#ffff00' });
    bullets.push({ x: player.x+12, y: player.y-14, vx: 1.5, vy: -11, r: 4, type:'player', color:'#ffff00' });
  }
}

function drawBullets() {
  bullets.forEach(b => {
    if(b.type === 'player') {
      const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*2);
      grd.addColorStop(0, b.color);
      grd.addColorStop(1, 'rgba(0,255,100,0)');
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r*2, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    } else {
      // enemy bullet
      const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*2);
      grd.addColorStop(0, '#ff4400');
      grd.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r*2, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fillStyle = '#ffaa00';
      ctx.fill();
    }
  });
}

// ========================
// ENEMIES
// ========================
function spawnEnemy() {
  const types = ['mushroom','wolf','bat','owl'];
  let type;
  const r = Math.random();
  if(difficultyLevel < 3) {
    type = r < 0.5 ? 'mushroom' : (r < 0.8 ? 'bat' : 'wolf');
  } else {
    type = types[Math.floor(Math.random()*types.length)];
  }

  const x = 30 + Math.random()*(W-60);
  let hp, speed, score_val, size, shootRate;

  switch(type) {
    case 'mushroom': hp=1; speed=enemySpeed*0.8; score_val=10; size=20; shootRate=0; break;
    case 'bat': hp=1; speed=enemySpeed*1.4; score_val=15; size=18; shootRate=0; break;
    case 'wolf': hp=2; speed=enemySpeed*0.9; score_val=20; size=24; shootRate=180; break;
    case 'owl': hp=3; speed=enemySpeed*1.1; score_val=30; size=22; shootRate=120; break;
  }

  enemies.push({
    x, y: -30,
    vx: (Math.random()-0.5)*1.5,
    vy: speed,
    hp, maxHp: hp,
    type, size, score_val,
    shootRate, shootTimer: Math.random()*shootRate,
    angle: 0, sway: Math.random()*Math.PI*2,
    flash: 0
  });
}

function spawnBoss() {
  bossActive = true;
  bossEnemy = {
    x: W/2, y: -60,
    vx: 2, vy: 1.5,
    hp: 30 + difficultyLevel*15,
    maxHp: 30 + difficultyLevel*15,
    type: 'boss',
    size: 55,
    score_val: 300 + difficultyLevel*50,
    shootRate: 50,
    shootTimer: 0,
    angle: 0,
    phase: 0,
    flash: 0,
    phaseTimer: 0
  };
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if(e.flash > 0) {
    ctx.globalAlpha = 0.7 + 0.3*Math.sin(e.flash*0.5);
  }

  switch(e.type) {
    case 'mushroom':
      // Cap
      ctx.beginPath();
      ctx.ellipse(0, -8, e.size*0.7, e.size*0.5, 0, Math.PI, 0);
      ctx.fillStyle = e.flash>0 ? '#ffffff' : '#cc2222';
      ctx.fill();
      // Dots
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(-6, -12, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -15, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -8, 2, 0, Math.PI*2); ctx.fill();
      // Stem
      ctx.beginPath();
      ctx.roundRect(-8, -8, 16, 14, 4);
      ctx.fillStyle = '#ffeecc';
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-4, -4, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -4, 2, 0, Math.PI*2); ctx.fill();
      break;

    case 'bat':
      e.angle = Math.sin(frameCount*0.15)*0.4;
      ctx.rotate(e.angle);
      // Wings
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-e.size,-10,-e.size*1.2,10,-e.size*0.3,8);
      ctx.fillStyle = e.flash>0 ? '#ffffff' : '#553377';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(e.size,-10,e.size*1.2,10,e.size*0.3,8);
      ctx.fillStyle = e.flash>0 ? '#ffffff' : '#553377';
      ctx.fill();
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 4, 10, 12, 0, 0, Math.PI*2);
      ctx.fillStyle = e.flash>0 ? '#ffffff' : '#331155';
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(-4, 2, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, 2, 2.5, 0, Math.PI*2); ctx.fill();
      break;

    case 'wolf':
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 4, e.size*0.6, e.size*0.5, 0, 0, Math.PI*2);
      ctx.fillStyle = e.flash>0 ? '#ffffff' : '#996633';
      ctx.fill();
