<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>레트로 디펜스 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Courier New',monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:1;width:100%;height:100%}
#nickScreen,#overScreen{position:fixed;z-index:10;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#0f0}
#nickScreen h1{font-size:2em;color:#ff0;text-shadow:2px 2px #f00;margin-bottom:10px;letter-spacing:4px}
#nickScreen p{color:#0ff;margin-bottom:30px;font-size:0.9em}
.nick-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.nick-btn{padding:12px 24px;background:#111;border:2px solid #0f0;color:#0f0;font-family:'Courier New',monospace;font-size:1.1em;cursor:pointer;transition:all 0.2s}
.nick-btn.sel{background:#0f0;color:#000}
#startBtn{padding:14px 48px;background:#ff0;border:3px solid #f00;color:#000;font-family:'Courier New',monospace;font-size:1.3em;font-weight:bold;cursor:pointer;letter-spacing:2px}
#overScreen h2{font-size:2em;color:#f00;margin-bottom:10px;text-shadow:2px 2px #ff0}
#overScreen .score{font-size:1.5em;color:#ff0;margin-bottom:20px}
#board{color:#0ff;font-size:0.95em;margin-bottom:20px;text-align:center;line-height:1.8em}
#retryBtn{padding:12px 40px;background:#0f0;border:3px solid #ff0;color:#000;font-family:'Courier New',monospace;font-size:1.2em;cursor:pointer;font-weight:bold}
#hud{position:fixed;top:8px;left:0;width:100%;z-index:5;display:none;justify-content:space-between;padding:4px 12px;color:#0f0;font-family:'Courier New',monospace;font-size:0.95em;pointer-events:none}
</style>
</head>
<body>
<div id="nickScreen">
  <h1>★ RETRO DEFENSE ★</h1>
  <p>▶ 2026-05-25 ◀</p>
  <div class="nick-btns">
    <button class="nick-btn" onclick="selNick(this,'태형')">태형</button>
    <button class="nick-btn" onclick="selNick(this,'상이')">상이</button>
    <button class="nick-btn" onclick="selNick(this,'세준')">세준</button>
    <button class="nick-btn" onclick="selNick(this,'영근')">영근</button>
  </div>
  <button id="startBtn" onclick="startGame()">▶ START ◀</button>
</div>
<div id="hud"><span id="hudScore">SCORE: 0</span><span id="hudLv">WAVE: 1</span><span id="hudHp">HP: ♥♥♥</span></div>
<canvas id="c"></canvas>
<div id="overScreen" style="display:none">
  <h2>★ GAME OVER ★</h2>
  <div class="score" id="finalScore"></div>
  <div id="board"></div>
  <button id="retryBtn" onclick="location.reload()">▶ RETRY ◀</button>
</div>
<script>
const SB=window.supabase.createClient('https://zypthfexxjcsguycjggr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHRoZmV4eGpjc2d1eWNqZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Njc2NzksImV4cCI6MjA5MjM0MzY3OX0.HaC4ltXQrO7_BQCeLqBVtvCBs4wL3Hzy6Ow_mO24vs0');
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let nick='',score=0,hp=3,wave=1,running=false,raf,enemies=[],bullets=[],particles=[],spawnT=0,waveT=0,waveEnemies=0,maxWaveE=8;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
function selNick(el,n){document.querySelectorAll('.nick-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');nick=n}
function startGame(){if(!nick)return alert('닉네임을 선택하세요!');document.getElementById('nickScreen').style.display='none';document.getElementById('hud').style.display='flex';running=true;loop()}
const BASE=()=>({x:canvas.width/2,y:canvas.height-60,r:22});
function spawnEnemy(){
  const types=['▲','■','●','♦'];const cols=['#f00','#f80','#f0f','#ff0'];
  const t=Math.floor(Math.random()*types.length);
  const spd=1.2+wave*0.3+Math.random()*0.8;
  enemies.push({x:Math.random()*(canvas.width-40)+20,y:-20,r:14,spd,hp:1+(wave>3?1:0),sym:types[t],col:cols[t],shoot:wave>2&&Math.random()<0.3,sTimer:0});
}
function spawnParticle(x,y,col){for(let i=0;i<6;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:30,col})}
let autoShoot=0;
function update(){
  if(!running)return;
  const b=BASE();
  autoShoot++;if(autoShoot>18){autoShoot=0;if(enemies.length>0){let nearest=enemies.reduce((a,e)=>Math.hypot(e.x-b.x,e.y-b.y)<Math.hypot(a.x-b.x,a.y-b.y)?e:a,enemies[0]);let ang=Math.atan2(nearest.y-b.y,nearest.x-b.x);bullets.push({x:b.x,y:b.y,vx:Math.cos(ang)*10,vy:Math.sin(ang)*10,player:true});}}
  spawnT++;waveT++;
  const interval=Math.max(40,90-wave*8);
  if(spawnT>interval&&waveEnemies<maxWaveE){spawnT=0;spawnEnemy();waveEnemies++;}
  if(waveEnemies>=maxWaveE&&enemies.length===0){wave++;waveEnemies=0;maxWaveE=8+wave*2;spawnT=0;}
  enemies.forEach(e=>{e.y+=e.spd;if(e.shoot){e.sTimer++;if(e.sTimer>80){e.sTimer=0;let ang=Math.atan2(b.y-e.y,b.x-e.x);bullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,player:false});}}});
  bullets.forEach(bl=>{bl.x+=bl.vx;bl.y+=bl.vy});
  bullets=bullets.filter(bl=>bl.x>-10&&bl.x<canvas.width+10&&bl.y>-10&&bl.y<canvas.height+10);
  bullets.forEach((bl,bi)=>{if(bl.player){enemies.forEach((e,ei)=>{if(Math.hypot(bl.x-e.x,bl.y-e.y)<e.r+5){spawnParticle(e.x,e.y,e.col);e.hp--;if(e.hp<=0){enemies.splice(ei,1);score+=10+wave*5;}bullets.splice(bi,1);}})}else{if(Math.hypot(bl.x-b.x,bl.y-b.y)<b.r+5){hp--;bullets.splice(bi,1);spawnParticle(b.x,b.y,'#0f0');if(hp<=0){endGame();return;}}}});
  enemies.forEach((e,i)=>{if(e.y>canvas.height+20){enemies.splice(i,1);hp--;spawnParticle(b.x,b.y,'#f00');if(hp<=0)endGame();}});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
  document.getElementById('hudScore').textContent='SCORE: '+score;
  document.getElementById('hudLv').textContent='WAVE: '+wave;
  document.getElementById('hudHp').textContent='HP: '+'♥'.repeat(Math.max(0,hp))+'♡'.repeat(Math.max(0,3-hp));
}
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#111';for(let i=0;i<canvas.width;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}for(let j=0;j<canvas.height;j+=40){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(canvas.width,j);ctx.stroke();}
  const b=BASE();
  ctx.font='bold 36px Courier New';ctx.fillStyle='#0f0';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',b.x,b.y);
  ctx.strokeStyle='#0f0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
  enemies.forEach(e=>{ctx.font='bold 26px Courier New';ctx.fillStyle=e.col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.sym,e.x,e.y);});
  bullets.forEach(bl=>{ctx.beginPath();ctx.arc(bl.x,bl.y,bl.player?5:4,0,Math.PI*2);ctx.fillStyle=bl.player?'#ff0':'#f00';ctx.fill();});
  particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=p.life/30;ctx.fill();ctx.globalAlpha=1;});
}
function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}
async function endGame(){running=false;cancelAnimationFrame(raf);document.getElementById('hud').style.display='none';document.getElementById('overScreen').style.display='flex';document.getElementById('finalScore').textContent=nick+'  SCORE: '+score;
  await SB.from('scores').insert({game_date:'2026-05-25',nickname:nick,score});
  const{data}=await SB.from('scores').select('nickname,score').eq('game_date','2026-05-25').order('score',{ascending:false}).limit(5);
  let html='<b>★ LEADERBOARD ★</b><br>';if(data)data.forEach((r,i)=>html+=`${i+1}. ${r.nickname}  ${r.score}<br>`);
  document.getElementById('board').innerHTML=html;
}
function getTouchPos(e){const r=canvas.getBoundingClientRect();const t=e.touches[0];return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};}
canvas.addEventListener('touchstart',e=>{e.preventDefault();},{ passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();},{ passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{ passive:false});
canvas.addEventListener('mousedown',()=>{});canvas.addEventListener('mousemove',()=>{});canvas.addEventListener('mouseup',()=>{});
</script>
</body>
</html>
