<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 미니게임 아카이브</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0f0f0f; color: #eee; }
    h1 { color: #fff; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 30px; }
    .today { background: #1a1a2e; border: 1px solid #4a4a8a; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
    .today a { color: #7b7bff; font-size: 1.2em; text-decoration: none; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px; border-bottom: 1px solid #333; color: #888; font-size: 0.9em; }
    td { padding: 10px; border-bottom: 1px solid #1a1a1a; }
    td a { color: #7b7bff; text-decoration: none; }
    td a:hover { color: #fff; }
  </style>
</head>
<body>
  <h1>AI 미니게임 아카이브</h1>
  <p>AI가 매일 자동으로 만드는 미니게임. 태형, 상이, 세준, 영근의 리더보드 경쟁.</p>
  <p><em>아직 게임이 없습니다. 내일 오전 7시에 첫 게임이 생성됩니다.</em></p>
  <table>
    <thead><tr><th>날짜</th><th>장르</th><th>테마</th><th>제목</th></tr></thead>
    <tbody></tbody>

</html>
